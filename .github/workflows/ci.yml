name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
          - os: macos-latest
            name: macOS aarch64
          # Compile check only; binaries are not run on the Linux host
          - os: ubuntu-latest
            name: Windows x86_64 (cross)
            build-args: -Dtarget=x86_64-windows

    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        run: |
          ZIG_VERSION=0.16.0
          OS=$(uname -s | tr '[:upper:]' '[:lower:]' | sed 's/darwin/macos/')
          ARCH=$(uname -m | sed 's/arm64/aarch64/')
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-${ARCH}-${OS}-${ZIG_VERSION}.tar.xz" \
            | tar -xJ
          sudo mv "zig-${ARCH}-${OS}-${ZIG_VERSION}" /usr/local/zig
          echo "/usr/local/zig" >> "$GITHUB_PATH"

      - name: Install ncurses (Linux only)
        if: runner.os == 'Linux' && matrix.build-args == ''
        run: sudo apt-get update && sudo apt-get install -y libncursesw5-dev

      - name: Build
        run: zig build ${{ matrix.build-args }}

      - name: Test
        if: matrix.build-args == ''
        run: zig build test
